<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tempo</title>
</head>

<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="videos/snow-night.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- conteudo rolável -->
    <section class="content">
        <div class="grid">
            <div id="clock">
                <h2>relógio</h2>
                <p id="time">00:00:00</p>
            </div>

            <div class="whether">
                <h2>clima</h2>
                <p id="whether">Carregando...</p>
            </div>

            <div class="timer">
                <h2>timer</h2>
                <p id="timer-display">25:00</p>

                <button onclick="iniciarPausar()" id="btn-iniciar">Iniciar</button>
                <button id="btn-pausar" onclick="pauseTimer()">Pausar</button>
                <button id="btn-resetar" onclick="resetTimer()">Resetar</button>

                <div class="player">
                    <h2>Player</h2>
                    <p>Spotify</p>
                </div>

                <div id="playlist">
                    <ul>
                        <li>music1</li>
                        <li>music2</li>
                        <li>music3</li>
                    </ul>
                </div>
            </div>
    </section>
</body>

</html>
<script src="script.js"></script>
