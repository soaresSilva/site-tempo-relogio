<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Environment</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===================== -->
    <!-- VÍDEO DE FUNDO -->
    <!-- ===================== -->

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="videos/snow-night.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- ===================== -->
    <!-- CONTEÚDO -->
    <!-- ===================== -->

    <main class="content">

        <div class="grid">

            <!-- RELÓGIO -->
            <section class="card clock">
                <h2>🕒 Horário</h2>
                <p id="time">
                    00:00:00
                </p>
            </section>

            <!-- CLIMA -->
            <section class="card weather">
                <h2>🌤 Clima</h2>
                <p id="weather">
                    Carregando...
                </p>
            </section>

            <!-- POMODORO -->
            <section class="card timer">
                <h2>🍅 Pomodoro</h2>
                <p id="timer-display">
                    25:00
                </p>
                <div class="buttons">
                    <button id="btn-iniciar">
                        ▶ Iniciar
                    </button>
                    <button id="btn-pausar">
                        ⏸ Pausar
                    </button>
                    <button id="btn-resetar">
                        ↺ Resetar
                    </button>
                </div>

            </section>

            <!-- PLAYER -->
            <section class="card player">
                <h2>🎵 Tocando Agora</h2>
                <button id="btn-login" style="visibility: hidden;" onclick="handleAuthClick()">Conectar Youtube</button>
                <button id="btn-logout" style="display: none;" onclick="handleSignoutClick()">Sair</button>
                <div id="playlist-container" style="display: none;"></div>

                <div id="youtube-player"></div>
                <p id="now-playing">Faça login para acessar suas playlists</p>
            </section>

            <!-- PLAYLIST -->
            <section class="card playlist">
                <h2>📃 Playlist</h2>
                <ul id="playlist">
                    <!-- JavaScript cria os itens -->
                </ul>
            </section>

        </div>

    </main>

    <!-- API DO YOUTUBE -->

    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- SCRIPT PRINCIPAL -->

    <script src="script.js" defer></script>

</body>

</html>
